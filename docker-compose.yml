# 本地 demo：一键启动 postgres + 后端 + 前端
# 部署到 EC2 用 RDS 时：在 .env 里填 DATABASE_URL 等即可
#
# 重要：要保留数据库数据，不要用 docker-compose down -v（-v 会删掉 pgdata 卷）

services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: pet_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d pet_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      # 写死连 postgres 服务，避免被 .env 里的 DATABASE_URL 覆盖。用 RDS 时改下面这行为你的 RDS 连接串
      DATABASE_URL: postgresql://app:app@postgres:5432/pet_booking
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 不填时前端连本机 3001
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: pet-frontend
    restart: unless-stopped
    ports:
      - "80:3000"   # 宿主机 80 → 容器内 3000，直接访问不用带端口
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    depends_on:
      - backend

volumes:
  pgdata:
